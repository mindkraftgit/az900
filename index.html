<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 Practice — 1000 Questions</title>
<meta name="theme-color" content="#0b0e14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AZ-900">

<style>
:root{
  --bg:#0b0e14;
  --panel:#121826;
  --panel2:#0e1422;
  --ink:#e6edf6;
  --muted:#8a97ad;
  --line:#1f2a3d;
  --accent:#3fd0c9;
  --accent2:#5b8cff;
  --correct:#2fd47e;
  --correct-bg:rgba(47,212,126,0.12);
  --wrong:#ff6b6b;
  --wrong-bg:rgba(255,107,107,0.10);
  --warn:#ffd479;
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(91,140,255,0.10), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(63,208,201,0.08), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.wrap{max-width:860px;margin:0 auto;padding:24px 18px 120px}

/* Header */
header{
  display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
  padding-bottom:18px;margin-bottom:20px;border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:4px}
.brand .eyebrow{
  font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
}
.brand h1{
  margin:0;font-size:26px;font-weight:700;letter-spacing:-.01em;
}
.brand h1 span{color:var(--muted);font-weight:500}
.scorebox{
  font-family:"JetBrains Mono",ui-monospace,monospace;
  text-align:right;font-size:13px;color:var(--muted);min-width:140px;
}
.scorebox .pct{font-size:30px;color:var(--ink);font-weight:700;letter-spacing:-.02em;line-height:1}
.scorebox .pct.pass{color:var(--correct)}
.scorebox .pct.fail{color:var(--warn)}

/* Controls */
.controls{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;
}
select,.btn{
  font-family:inherit;font-size:13px;color:var(--ink);
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;cursor:pointer;transition:border-color .15s,background .15s;
}
select:hover,.btn:hover{border-color:var(--accent)}
.btn.ghost{background:transparent}
.spacer{flex:1}
.count-label{font-size:12px;color:var(--muted);font-family:"JetBrains Mono",monospace}

/* Progress rail */
.rail{height:6px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-bottom:24px;border:1px solid var(--line)}
.rail > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s ease}

/* Card */
.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:var(--radius);
  padding:24px 22px;margin-bottom:18px;position:relative;
}
.meta{
  display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;
  font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;
}
.tag{
  padding:3px 8px;border-radius:6px;letter-spacing:.04em;
  background:rgba(91,140,255,0.12);color:var(--accent2);border:1px solid rgba(91,140,255,0.25);
}
.tag.dom{background:rgba(63,208,201,0.10);color:var(--accent);border-color:rgba(63,208,201,0.25)}
.tag.multi{background:rgba(255,212,121,0.12);color:var(--warn);border-color:rgba(255,212,121,0.3)}
.qnum{color:var(--muted);margin-left:auto}
.stem{font-size:17px;font-weight:550;margin:0 0 18px;letter-spacing:-.005em}

/* Options */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px 14px;border:1px solid var(--line);border-radius:11px;
  background:var(--panel2);cursor:pointer;transition:border-color .12s,background .12s;
  user-select:none;
}
.opt:hover{border-color:var(--accent2)}
.opt input{
  appearance:none;-webkit-appearance:none;margin:0;flex:none;
  width:19px;height:19px;border:2px solid var(--muted);background:transparent;
  cursor:pointer;position:relative;transition:border-color .12s;margin-top:1px;
}
.opt input[type=radio]{border-radius:50%}
.opt input[type=checkbox]{border-radius:5px}
.opt input:checked{border-color:var(--accent)}
.opt input[type=radio]:checked::after{
  content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent);
}
.opt input[type=checkbox]:checked::after{
  content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;
  border:solid var(--accent);border-width:0 2px 2px 0;transform:rotate(45deg);
}
.opt .otext{flex:1;font-size:15px;padding-top:0}
.opt .marker{
  font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);
  flex:none;width:18px;text-align:center;padding-top:1px;
}
/* revealed states */
.opt.correct{border-color:var(--correct);background:var(--correct-bg)}
.opt.correct .marker{color:var(--correct)}
.opt.wrongpick{border-color:var(--wrong);background:var(--wrong-bg)}
.opt.wrongpick .marker{color:var(--wrong)}
.opt.locked{cursor:default}
.opt.locked:hover{border-color:var(--line)}
.opt.locked.correct:hover{border-color:var(--correct)}
.opt.locked.wrongpick:hover{border-color:var(--wrong)}
.verdict-icon{flex:none;font-weight:700;font-size:15px;margin-left:auto;padding-top:1px}

/* Actions */
.actions{display:flex;gap:10px;margin-top:18px;align-items:center;flex-wrap:wrap}
.reveal-btn{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#04121a;font-weight:650;border:none;border-radius:10px;
  padding:11px 20px;font-size:14px;cursor:pointer;font-family:inherit;
  transition:transform .1s,opacity .15s;
}
.reveal-btn:hover{transform:translateY(-1px)}
.reveal-btn:disabled{opacity:.4;cursor:default;transform:none}
.verdict-text{font-size:13px;font-family:"JetBrains Mono",monospace;font-weight:600}
.verdict-text.ok{color:var(--correct)}
.verdict-text.no{color:var(--wrong)}

/* Explanation */
.explain{
  margin-top:16px;padding:16px;border-radius:11px;
  background:var(--panel2);border:1px solid var(--line);
  border-left:3px solid var(--accent);
  display:none;animation:fade .25s ease;
}
.explain.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.explain .lbl{
  font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);margin-bottom:6px;
}
.explain p{margin:0 0 12px;font-size:14.5px;color:var(--ink)}
.explain a{
  display:inline-flex;align-items:center;gap:6px;font-size:13px;
  color:var(--accent2);text-decoration:none;font-weight:550;
  padding:7px 12px;border:1px solid rgba(91,140,255,0.3);border-radius:8px;
  background:rgba(91,140,255,0.07);transition:background .15s;
}
.explain a:hover{background:rgba(91,140,255,0.15)}

/* Footer nav */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(11,14,20,0.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);padding:12px 18px;
  display:flex;gap:12px;align-items:center;justify-content:center;z-index:10;
}
.nav .inner{max-width:860px;width:100%;display:flex;gap:12px;align-items:center}
.nav .btn{padding:10px 16px}
.nav .pos{
  font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted);
  flex:1;text-align:center;
}
.nav .pos b{color:var(--ink)}
.jump{
  width:64px;text-align:center;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:8px;padding:7px;font-family:"JetBrains Mono",monospace;font-size:13px;
}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}

@media (max-width:560px){
  .brand h1{font-size:22px}
  .stem{font-size:16px}
  .scorebox{min-width:110px}
  .nav .btn{padding:10px 12px;font-size:12px}
  .controls{gap:8px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">Azure Fundamentals · Practice Exam</div>
      <h1>AZ-900 <span>/ 1000 questions</span></h1>
    </div>
    <div class="scorebox">
      <div class="pct" id="pct">—</div>
      <div id="scoreline">0 answered</div>
    </div>
  </header>

  <div class="controls">
    <select id="domainFilter">
      <option value="all">All domains</option>
      <option value="Cloud Concepts">Cloud Concepts (25–30%)</option>
      <option value="Azure Architecture &amp; Services">Architecture &amp; Services (35–40%)</option>
      <option value="Azure Management &amp; Governance">Management &amp; Governance (30–35%)</option>
    </select>
    <select id="filterMode">
      <option value="all">All questions</option>
      <option value="unanswered">Unanswered only</option>
      <option value="wrong">Got wrong</option>
      <option value="flagged">Flagged ★</option>
    </select>
    <button class="btn ghost" id="flagBtn" title="Flag this question">★ Flag</button>
    <div class="spacer"></div>
    <button class="btn ghost" id="exportBtn" title="Save progress to a file">Export</button>
    <button class="btn ghost" id="importBtn" title="Load progress from a file">Import</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="btn ghost" id="resetBtn">Reset</button>
  </div>

  <div class="rail"><div id="railFill"></div></div>

  <div id="cardHost"></div>

</div>

<div class="nav">
  <div class="inner">
    <button class="btn" id="prevBtn">← Prev</button>
    <div class="pos">
      Q <input class="jump" id="jump" type="number" min="1"> <span id="posTotal"></span>
    </div>
    <button class="btn" id="nextBtn">Next →</button>
  </div>
</div>

nts to deploy code without managing the OS or servers. Latency should be low. Choose the appropriate option.","opts":[["Infrastructure as a service (IaaS)",0],["Colocation",0],["Software as a service (SaaS)",0],["Platform as a service (PaaS)",1]],"m":0,"e":"A managed platform for code without OS management is PaaS.","l":"https://learn.microsoft.com/en-us/training/modules/describe-cloud-service-types/","id":600},{"d":"Azure Management & Governance","o":"Managing and deploying resources","s":"Tailwind Traders wants to manage on-premises and multicloud servers from Azure. Assume default settings. Which is the most appropriate choice?","opts":[["Azure Virtual Machines",0],["Azure Arc",1],["Azure Functions",0],["Azure Cosmos DB",0]],"m":0,"e":"Managing anywhere from Azure is Azure Arc.","l":"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-manage-deploy-azure-resources/","id":952},{"d":"Azure Architecture & Services","o":"Identity, access, and security","s":"VanArsdel wants security posture and threat alerts across Azure and AWS. High availability is required. What is the best-fit choice?","opts":[["Azure DNS",0],["Microsoft Defender for Cloud",1],["Azure Blob Storage",0],["Azure Functions",0]],"m":0,"e":"Cross-cloud posture/threat protection is Microsoft Defender for Cloud.","l":"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/","id":937},{"d":"Cloud Concepts","o":"Benefits of cloud services","s":"Contoso wants to recover quickly from a regional disaster. Budget is constrained. Identify the correct choice.","opts":[["Predictability",0],["Manageability",0],["Elasticity",0],["Disaster recovery",1]],"m":0,"e":"Recovering from a regional disaster is disaster recovery.","l":"https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/","id":380},{"d":"Azure Management & Governance","o":"Monitoring tools","s":"Woodgrove Bank needs to know about an ongoing Azure regional outage affecting them. Latency should be low. Which option should you recommend?","opts":[["Azure Files",0],["Azure Application Gateway",0],["Microsoft Cost Management",0],["Azure Service Health",1]],"m":0,"e":"Personalized outage info is Azure Service Health.","l":"https://learn.microsoft.com/en-us/training/modules/describe-monitoring-tools-azure/","id":476},{"d":"Azure Architecture & Services","o":"Networking services","s":"Proseware needs a private high-bandwidth link to Azure off the public internet. The app is customer-facing. Which option satisfies the requirement?","opts":[["Azure DNS",0],["Azure SQL Database",0],["Azure ExpressRoute",1],["Azure Load Balancer",0]],"m":0,"e":"Private predictable connectivity is ExpressRoute.","l":"https://learn.microsoft.com/en-us/training/modules/describe-azure-networking-services/","id":117},{"d":"Cloud Concepts","o":"Cloud deployment models","s":"Contoso keeps regulated data on-premises but bursts compute to the public cloud. Simplicity is the main goal. Identify the correct choice.","opts":[["Multi-cloud",0],["Hybrid cloud",1],["Public cloud",0],["Private cloud",0]],"m":0,"e":"Mixing on-premises with public cloud is hybrid.","l":"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/5-define-cloud-models","id":993},{"d":"Azure Management & Governance","o":"Cost management","s":"Lamna Healthcare wants to estimate monthly cost of a proposed architecture before building. What best fits this scenario?","opts":[["Azure Firewall",0],["Azure Files",0],["Azure Pricing Calculator",1],["Azure Functions",0]],"m":0,"e":"Pre-deployment estimates use the Pricing Calculator.","l":"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/","id":448},{"d":"Azure Architecture & Services","o":"Compute services","s":"Relecloud needs to orchestrate hundreds of containers with scaling and self-healing. Simplicity is the main goal. Identify the correct choice.","opts":[["Azure VPN Gateway",0],["Azure Functions",0],["Azure Kubernetes Service (AKS)",1],["Azure Container Instances",0]],"m":0,"e":"Container orchestration at scale is AKS.","l":"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/","id":738}];
</script>
<script>
// ---- State ----
const Q = RAW.map((q,i)=>({...q, _idx:i}));
const STORE_KEY = 'az900_progress_v1';

function blankRec(){return Q.map(()=>({picked:new Set(), revealed:false, correct:null, flagged:false}));}

// Load saved progress from device storage (survives closing the app / restarting).
// picked is stored as an array because Sets aren't JSON-serializable.
function loadRec(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return blankRec();
    const saved = JSON.parse(raw);
    // saved is keyed by question id -> {p:[...],r:bool,c:bool|null,f:bool}
    return Q.map(q=>{
      const s = saved[q.id];
      if(!s) return {picked:new Set(), revealed:false, correct:null, flagged:false};
      return {
        picked:new Set(Array.isArray(s.p)?s.p:[]),
        revealed:!!s.r,
        correct:(s.c===true||s.c===false)?s.c:null,
        flagged:!!s.f
      };
    });
  }catch(e){ return blankRec(); }
}

// Persist progress. Only stores questions that have been touched, keyed by stable id.
function save(){
  try{
    const out = {};
    Q.forEach((q,i)=>{
      const r = state.rec[i];
      if(r.picked.size || r.revealed || r.flagged){
        out[q.id] = {p:[...r.picked], r:r.revealed, c:r.correct, f:r.flagged};
      }
    });
    localStorage.setItem(STORE_KEY, JSON.stringify(out));
  }catch(e){ /* storage unavailable (e.g. private mode) — app still works in-memory */ }
}

const state = {
  rec: loadRec(),
  order: Q.map((_,i)=>i),   // indices into Q, current filtered view
  pos: 0,
};

const $ = s=>document.querySelector(s);
const host = $('#cardHost');

function activeList(){
  const dom = $('#domainFilter').value;
  const mode = $('#filterMode').value;
  let list = Q.map((_,i)=>i);
  if(dom!=='all') list = list.filter(i=>Q[i].d===dom);
  if(mode==='unanswered') list = list.filter(i=>!state.rec[i].revealed);
  else if(mode==='wrong') list = list.filter(i=>state.rec[i].correct===false);
  else if(mode==='flagged') list = list.filter(i=>state.rec[i].flagged);
  return list;
}

function recompute(){
  state.order = activeList();
  if(state.pos >= state.order.length) state.pos = Math.max(0, state.order.length-1);
}

function letter(n){return String.fromCharCode(65+n);}

function render(){
  recompute();
  const total = state.order.length;
  $('#posTotal').textContent = '/ ' + total;
  $('#jump').max = total;

  // score
  const answered = state.rec.filter(r=>r.revealed).length;
  const right = state.rec.filter(r=>r.correct===true).length;
  const pct = answered? Math.round(100*right/answered) : null;
  $('#pct').textContent = pct===null? '—' : pct+'%';
  $('#pct').className = 'pct' + (pct===null?'':(pct>=70?' pass':' fail'));
  $('#scoreline').textContent = answered? (right+'/'+answered+' correct') : '0 answered';

  // progress rail = fraction of full bank revealed
  $('#railFill').style.width = (100*state.rec.filter(r=>r.revealed).length/Q.length)+'%';

  if(total===0){
    host.innerHTML = '<div class="empty">No questions match this filter.<br>Try a different filter above.</div>';
    $('#jump').value = 0;
    return;
  }

  const qi = state.order[state.pos];
  const q = Q[qi];
  const rec = state.rec[qi];
  $('#jump').value = state.pos+1;
  $('#flagBtn').textContent = rec.flagged ? '★ Flagged' : '★ Flag';
  $('#flagBtn').style.color = rec.flagged ? 'var(--warn)' : '';

  const domShort = q.d;
  const inputType = q.m ? 'checkbox':'radio';

  let optsHtml = q.opts.map((o,oi)=>{
    const txt=o[0], isCorrect=o[1]===1;
    const checked = rec.picked.has(oi);
    let cls='opt';
    let icon='';
    if(rec.revealed){
      cls+=' locked';
      if(isCorrect){cls+=' correct'; icon='<span class="verdict-icon" style="color:var(--correct)">✓</span>';}
      else if(checked){cls+=' wrongpick'; icon='<span class="verdict-icon" style="color:var(--wrong)">✕</span>';}
    }
    return `<label class="${cls}" data-oi="${oi}">
      <input type="${inputType}" name="opt" ${checked?'checked':''} ${rec.revealed?'disabled':''}>
      <span class="marker">${letter(oi)}</span>
      <span class="otext">${esc(txt)}</span>
      ${icon}
    </label>`;
  }).join('');

  const verdict = rec.revealed
    ? (rec.correct
        ? '<span class="verdict-text ok">✓ Correct</span>'
        : '<span class="verdict-text no">✕ Incorrect</span>')
    : '';

  host.innerHTML = `
   <div class="card">
     <div class="meta">
       <span class="tag dom">${esc(domShort)}</span>
       <span class="tag">${esc(q.o)}</span>
       ${q.m?'<span class="tag multi">Select '+countCorrect(q)+'</span>':''}
       <span class="qnum">#${q.id}</span>
     </div>
     <p class="stem">${esc(q.s)}</p>
     <div class="opts">${optsHtml}</div>
     <div class="actions">
       <button class="reveal-btn" id="revealBtn" ${rec.revealed?'disabled':''}>
         ${rec.revealed?'Answer shown':'Show Answer'}
       </button>
       ${verdict}
     </div>
     <div class="explain ${rec.revealed?'show':''}" id="explain">
       <div class="lbl">Explanation</div>
       <p>${esc(q.e)}</p>
       <a href="${esc(q.l)}" target="_blank" rel="noopener">
         Study on Microsoft Learn ↗
       </a>
     </div>
   </div>`;

  // wire option clicks
  host.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',ev=>{
      if(rec.revealed) return;
      const oi = +el.dataset.oi;
      const input = el.querySelector('input');
      if(q.m){
        if(rec.picked.has(oi)){rec.picked.delete(oi);input.checked=false;}
        else{rec.picked.add(oi);input.checked=true;}
      }else{
        rec.picked.clear(); rec.picked.add(oi);
        host.querySelectorAll('input').forEach(i=>i.checked=false);
        input.checked=true;
      }
      ev.preventDefault();
    });
  });

  $('#revealBtn').addEventListener('click',()=>{
    if(rec.picked.size===0) return; // require an attempt
    rec.revealed=true;
    rec.correct=isRight(q,rec.picked);
    save();
    render();
  });
}

function countCorrect(q){return q.opts.filter(o=>o[1]===1).length;}
function isRight(q,picked){
  const correct = new Set(q.opts.map((o,i)=>o[1]===1?i:-1).filter(i=>i>=0));
  if(picked.size!==correct.size) return false;
  for(const p of picked) if(!correct.has(p)) return false;
  return true;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---- Nav ----
$('#prevBtn').onclick=()=>{if(state.pos>0){state.pos--;render();window.scrollTo({top:0,behavior:'smooth'});}};
$('#nextBtn').onclick=()=>{if(state.pos<state.order.length-1){state.pos++;render();window.scrollTo({top:0,behavior:'smooth'});}};
$('#jump').addEventListener('change',e=>{
  let v=parseInt(e.target.value,10);
  if(isNaN(v))return;
  v=Math.max(1,Math.min(state.order.length,v));
  state.pos=v-1;render();window.scrollTo({top:0,behavior:'smooth'});
});
$('#domainFilter').onchange=()=>{state.pos=0;render();};
$('#filterMode').onchange=()=>{state.pos=0;render();};
$('#flagBtn').onclick=()=>{const qi=state.order[state.pos];if(qi==null)return;state.rec[qi].flagged=!state.rec[qi].flagged;save();render();};
$('#resetBtn').onclick=()=>{
  if(!confirm('Reset all answers, scores, and flags? This clears saved progress on this device.'))return;
  state.rec=blankRec();
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  state.pos=0;$('#domainFilter').value='all';$('#filterMode').value='all';render();
};
// ---- Export / Import progress (move between devices, or back up) ----
$('#exportBtn').onclick=()=>{
  const out = {};
  Q.forEach((q,i)=>{
    const r = state.rec[i];
    if(r.picked.size || r.revealed || r.flagged){
      out[q.id] = {p:[...r.picked], r:r.revealed, c:r.correct, f:r.flagged};
    }
  });
  const blob = new Blob([JSON.stringify({app:'az900',v:1,data:out},null,0)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date().toISOString().slice(0,10);
  a.href=url; a.download='az900-progress-'+d+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').addEventListener('change',e=>{
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      const saved = parsed && parsed.data ? parsed.data : parsed; // tolerate raw map too
      if(typeof saved!=='object' || saved===null) throw new Error('bad file');
      state.rec = Q.map(q=>{
        const s = saved[q.id];
        if(!s) return {picked:new Set(), revealed:false, correct:null, flagged:false};
        return {picked:new Set(Array.isArray(s.p)?s.p:[]), revealed:!!s.r,
                correct:(s.c===true||s.c===false)?s.c:null, flagged:!!s.f};
      });
      save(); state.pos=0; render();
      alert('Progress imported.');
    }catch(err){ alert('Could not read that file — make sure it was exported from this app.'); }
    e.target.value=''; // allow re-importing same file
  };
  reader.readAsText(file);
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowLeft')$('#prevBtn').click();
  else if(e.key==='ArrowRight')$('#nextBtn').click();
});

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
(function(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone = window.navigator.standalone === true ||
                     window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !standalone) {
    const bar = document.createElement('div');
    bar.style.cssText = 'position:fixed;left:12px;right:12px;bottom:78px;z-index:50;'+
      'background:#121826;border:1px solid #1f2a3d;border-radius:12px;padding:12px 14px;'+
      'font-size:13px;color:#e6edf6;display:flex;gap:10px;align-items:center;'+
      'box-shadow:0 8px 28px rgba(0,0,0,.5);font-family:inherit';
    bar.innerHTML = 'Install: tap the Share icon, then <b style="color:#3fd0c9">Add to Home Screen</b>'+
      '<button style="margin-left:auto;background:transparent;border:none;color:#8a97ad;'+
      'font-size:18px;cursor:pointer;padding:0 4px">×</button>';
    bar.querySelector('button').onclick = ()=>bar.remove();
    document.body.appendChild(bar);
    setTimeout(()=>{ if(bar.parentNode) bar.remove(); }, 12000);
  }
})();
</script>
